services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile.prod
    container_name: spring_backend_prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      # Inside Docker, localhost is the backend container.
      # host.docker.internal points to the host machine's localhost:5432.
      SERVER_ADDRESS: 0.0.0.0
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/bookora}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-nuapgr9}
      JWT_SECRET: ${JWT_SECRET:-very-secret-key-1234567890123456}

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-web-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
